<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文化传播智能体</title>
  <link rel="stylesheet" href="/app/styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <strong id="brandName">小飞</strong>
        <span id="brandSub">文化传播智能体</span>
      </div>
      <div class="top-actions">
        <span class="health-badge" id="healthBadge">检测服务中...</span>
        <select id="marketSelect" class="market-select">
          <option value="AFRICA" selected>AFRICA</option>
        </select>
        <button id="newTaskBtn" class="btn btn-primary">+ 新建任务</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2 id="sidebarTitle">导航</h2>
        <nav class="nav-list">
          <button class="nav-item active" data-view="dialog">智能对话</button>
          <button class="nav-item" data-view="tasks">任务管理</button>
          <button class="nav-item" data-view="material">文化素材</button>
          <button class="nav-item" data-view="create">创建任务</button>
        </nav>

        <section class="card resources" id="resourcePanel">
          <h3>服务状态</h3>
          <p id="resLine1">检测中...</p>
          <p id="resLine2">--</p>
        </section>
      </aside>

      <!-- ===== Dialog View ===== -->
      <section class="center-panel view-panel" id="viewDialog">
        <div class="task-head card">
          <h3>智能对话</h3>
          <span id="chatMarketLabel">市场: AFRICA</span>
        </div>

        <section class="conversation card" id="chatMessages">
          <article class="bubble ai">你好！我是文化传播智能体助手。请告诉我你希望创作什么内容，我会根据目标市场的文化特点为你提供建议。</article>
        </section>

        <div class="composer card">
          <input id="chatInput" type="text" placeholder="输入你的文化传播目标、受众与语气要求..." />
          <button id="chatSendBtn" class="btn btn-primary">发送</button>
        </div>
        <div class="feedback" id="chatFeedback"></div>
      </section>

      <!-- ===== Tasks View ===== -->
      <section class="center-panel view-panel hidden" id="viewTasks">
        <div class="task-head card">
          <h3>任务管理</h3>
          <button id="refreshJobsBtn" class="btn btn-light btn-sm">刷新</button>
        </div>

        <div class="task-list card" id="jobsList">
          <p class="empty-hint">暂无任务，请先创建一个视频生成任务。</p>
        </div>
      </section>

      <!-- ===== Material View ===== -->
      <section class="center-panel view-panel hidden" id="viewMaterial">
        <div class="task-head card">
          <h3>文化素材库</h3>
          <span>按市场查看文化规则与内容策略</span>
        </div>

        <div class="material-grid" id="materialGrid">
          <p class="empty-hint">加载中...</p>
        </div>
      </section>

      <!-- ===== Create Task View ===== -->
      <section class="center-panel view-panel hidden" id="viewCreate">
        <div class="task-head card">
          <h3>创建视频生成任务</h3>
          <span>填写参数后提交，系统将自动生成文化适配的视频脚本</span>
        </div>

        <div class="create-form card">
          <label for="createTopic">主题 Topic</label>
          <input id="createTopic" type="text" value="fintech inclusion" placeholder="视频主题..." />

          <div class="form-row">
            <div>
              <label for="createMarket">目标市场</label>
              <select id="createMarket">
                <option value="AFRICA" selected>AFRICA</option>
              </select>
            </div>
            <div>
              <label for="createTone">语气风格</label>
              <input id="createTone" type="text" value="friendly" placeholder="如: friendly, formal..." />
            </div>
          </div>

          <label for="createTags">受众标签（逗号分隔）</label>
          <input id="createTags" type="text" value="18-35, mobile-first" placeholder="如: 18-35, mobile-first" />

          <button id="createSubmitBtn" class="btn btn-primary">提交任务</button>
          <div class="feedback" id="createFeedback"></div>
        </div>
      </section>

      <!-- ===== Right Panel ===== -->
      <aside class="right-panel">
        <h3>概览</h3>
        <p id="rightSub">任务统计与快捷操作</p>

        <section class="card metric">
          <p class="label">任务总数</p>
          <p class="value" id="metricTotal">--</p>
          <p class="hint" id="metricHint">加载中...</p>
        </section>

        <section class="card quick">
          <p class="label">最近任务</p>
          <div id="recentJobs">
            <p class="empty-hint">暂无</p>
          </div>
        </section>

        <section class="card quick">
          <p class="label">快捷操作</p>
          <button class="quick-item" id="quickChat">开始对话咨询</button>
          <button class="quick-item" id="quickCreate">创建新任务</button>
          <button class="quick-item" id="quickMaterial">查看文化素材</button>
        </section>
      </aside>
    </main>
  </div>

  <!-- Task Detail Modal -->
  <div class="modal-overlay hidden" id="taskModal">
    <div class="modal-content card">
      <div class="modal-header">
        <h3>任务详情</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <p>加载中...</p>
      </div>
    </div>
  </div>

  <script src="/app/script.js"></script>
</body>
</html>
