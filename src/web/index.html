<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Culture 控制台</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --accent-2: #34d399;
      --danger: #f43f5e;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #1f2937 0%, var(--bg) 45%, #020617 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .app {
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(17,24,39,0.92), rgba(15,23,42,0.95));
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    .header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .badge {
      padding: 6px 10px;
      border: 1px solid #0e7490;
      color: #67e8f9;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(34,211,238,0.08);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 18px;
    }
    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: rgba(2, 6, 23, 0.5);
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #cbd5e1;
    }
    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 13px;
      color: var(--muted);
    }
    input, textarea, select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }
    textarea { min-height: 82px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn {
      margin-top: 12px;
      border: 1px solid #0891b2;
      background: linear-gradient(90deg, rgba(6,182,212,0.2), rgba(52,211,153,0.2));
      cursor: pointer;
      transition: transform .15s ease, opacity .2s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.secondary {
      border-color: #4b5563;
      background: #0b1220;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 180px;
      max-height: 360px;
      overflow: auto;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.8);
    }
    .ok { color: var(--accent-2); }
    .err { color: var(--danger); }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <div class="title">Agent Culture 交互控制台</div>
        <div style="color:#94a3b8;font-size:13px;margin-top:4px;">默认市场 AFRICA，文本模型 DeepSeek，视频模型 Wan2.2（由 .env 配置）</div>
      </div>
      <div class="badge" id="healthBadge">检查服务中...</div>
    </header>

    <section class="grid">
      <div class="panel">
        <h2>1) 创建任务</h2>
        <label for="topic">主题 Topic</label>
        <input id="topic" value="fintech inclusion" />

        <div class="row">
          <div>
            <label for="market">市场 Market</label>
            <select id="market">
              <option value="AFRICA" selected>AFRICA</option>
              <option value="US">US</option>
              <option value="EU">EU</option>
            </select>
          </div>
          <div>
            <label for="tone">语气 Tone</label>
            <input id="tone" value="friendly" />
          </div>
        </div>

        <label for="tags">受众标签（逗号分隔）</label>
        <textarea id="tags">18-35,mobile-first</textarea>

        <button class="btn" id="createBtn">提交任务</button>
      </div>

      <div class="panel">
        <h2>2) 查询任务</h2>
        <label for="jobId">Job ID</label>
        <input id="jobId" placeholder="粘贴 job_id" />
        <button class="btn secondary" id="queryBtn">查询状态</button>

        <label style="margin-top:14px;">结果输出</label>
        <div class="mono" id="output">等待操作...</div>
      </div>
    </section>
  </main>

  <script>
    const output = document.getElementById('output');
    const healthBadge = document.getElementById('healthBadge');

    function print(data, isError = false) {
      output.className = isError ? 'mono err' : 'mono';
      output.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    async function checkHealth() {
      try {
        const res = await fetch('/health');
        const json = await res.json();
        healthBadge.textContent = `服务正常: ${json.status}`;
        healthBadge.classList.add('ok');
      } catch (e) {
        healthBadge.textContent = '服务不可用';
        healthBadge.classList.add('err');
      }
    }

    document.getElementById('createBtn').addEventListener('click', async () => {
      const topic = document.getElementById('topic').value.trim();
      const market = document.getElementById('market').value;
      const tone = document.getElementById('tone').value.trim();
      const tags = document.getElementById('tags').value
        .split(',')
        .map(v => v.trim())
        .filter(Boolean);

      if (!topic) {
        print('topic 不能为空', true);
        return;
      }

      const payload = { topic, market, tone, audience_tags: tags };

      try {
        const res = await fetch('/api/v1/jobs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const json = await res.json();
        if (!res.ok) {
          print(json, true);
          return;
        }
        document.getElementById('jobId').value = json.job_id;
        print({ message: '任务已提交', ...json });
      } catch (e) {
        print(String(e), true);
      }
    });

    document.getElementById('queryBtn').addEventListener('click', async () => {
      const jobId = document.getElementById('jobId').value.trim();
      if (!jobId) {
        print('请先输入 job_id', true);
        return;
      }

      try {
        const res = await fetch(`/api/v1/jobs/${jobId}`);
        const json = await res.json();
        if (!res.ok) {
          print(json, true);
          return;
        }
        print(json);
      } catch (e) {
        print(String(e), true);
      }
    });

    checkHealth();
  </script>
</body>
</html>
